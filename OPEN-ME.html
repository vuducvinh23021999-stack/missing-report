<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SKU Tracker Launcher</title>
<style>
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#0d0d10,#1a1a25);color:white;min-height:100vh;display:flex;align-items:center;justify-content:center;margin:0}
.box{text-align:center;background:rgba(255,255,255,.05);padding:60px;border-radius:20px;border:1px solid rgba(255,255,255,.1);max-width:500px}
h1{font-size:32px;margin:0 0 12px;background:linear-gradient(135deg,#5eead4,#14b8a6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
p{color:#999;font-size:14px;margin-bottom:32px}
.btn{display:inline-block;padding:16px 32px;background:linear-gradient(135deg,#5eead4,#14b8a6);color:white;text-decoration:none;border-radius:12px;font-weight:700;font-size:16px;margin:8px;transition:transform .2s}
.btn:hover{transform:translateY(-2px)}
.btn.alt{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2)}
.note{margin-top:24px;font-size:12px;color:#666;line-height:1.6}
</style>
</head>
<body>
<div class="box">
<h1>SKU MISSING Tracker</h1>
<p>Click de mo app</p>
<a class="btn" href="app.html">🚀 Mo Dashboard</a>
<a class="btn alt" href="app.html" target="_blank">📱 Mo tab moi</a>
<div class="note">
Neu app.html bi loi load du lieu:<br>
Mo bang cach bam chuot phai vao <b>start.bat</b> → <b>Run as Administrator</b><br>
Sau do truy cap: <b>http://localhost:8765/app.html</b>
</div>
</div>
</body>
</html>
